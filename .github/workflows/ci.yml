name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP Lint & PHPCS
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.0", "8.1", "8.2", "8.3"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: phpcs

      - name: Check PHP syntax
        run: find trunk -name "*.php" -exec php -l {} \; | grep -v "No syntax errors"

      - name: Install WordPress Coding Standards
        run: |
          composer global require wp-coding-standards/wpcs dealerdirect/phpcodesniffer-composer-installer
          phpcs --version

      - name: Run PHPCS (WordPress standard)
        run: phpcs --standard=WordPress trunk/ --extensions=php --report=summary

  compatibility:
    name: PHP Compatibility Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: phpcs

      - name: Check PHP 8.0+ compatibility
        run: |
          composer global require phpcompatibility/php-compatibility
          phpcs --standard=PHPCompatibility --runtime-set testVersion 8.0- trunk/

  readme-check:
    name: readme.txt Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required readme.txt fields
        run: |
          for field in "Plugin Name" "Requires at least" "Tested up to" "Stable tag" "License"; do
            grep -q "$field" trunk/readme.txt || { echo "❌ Missing: $field"; exit 1; }
          done
          echo "✅ readme.txt looks good"
