name: Deploy to WordPress.org

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"     # e.g. v1.0.0, v1.2.3

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: phpcs, phpstan

      - name: Install WordPress Coding Standards
        run: |
          composer global require wp-coding-standards/wpcs
          phpcs --config-set installed_paths ~/.composer/vendor/wp-coding-standards/wpcs

      - name: Run PHPCS
        run: phpcs --standard=WordPress trunk/ --extensions=php --report=summary

  # ─── Test ──────────────────────────────────────────────────────────────────
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: wordpress_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mysqli, pdo_mysql
          tools: composer, phpunit

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup WordPress test suite
        run: |
          bash tests/bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 latest
        env:
          WP_VERSION: latest

      - name: Run PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml

  # ─── Deploy to WordPress.org SVN ──────────────────────────────────────────
  deploy:
    name: SVN Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify readme.txt stable tag matches
        run: |
          STABLE_TAG=$(grep -oP '(?<=Stable tag:\s{8})[\d.]+' trunk/readme.txt)
          if [ "$STABLE_TAG" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "❌ readme.txt Stable tag ($STABLE_TAG) does not match git tag (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi
          echo "✅ Version match: $STABLE_TAG"

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.WP_SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.WP_SVN_USERNAME }}
          SLUG:         ctaforge
          BUILD_DIR:    trunk
          ASSETS_DIR:   assets
