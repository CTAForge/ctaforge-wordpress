name: Release & Deploy

# Triggered when a version tag is pushed: v1.0.0, v1.2.3, etc.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  # ─── Validate ──────────────────────────────────────────────────────────────
  validate:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Verify readme.txt Stable tag matches git tag
        run: |
          STABLE_TAG=$(grep -oP '(?<=Stable tag:\s{8})[\d.]+' trunk/readme.txt || grep -oP '(?<=Stable tag: )[\d.]+' trunk/readme.txt)
          if [ "$STABLE_TAG" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "❌ readme.txt Stable tag ($STABLE_TAG) ≠ git tag (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi
          echo "✅ Version match: $STABLE_TAG"

      - name: Verify plugin header version matches
        run: |
          HEADER_VER=$(grep -oP "(?<=Version:\s{5})[\d.]+" trunk/ctaforge.php || grep -oP "(?<= \* Version:\s{5})[\d.]+" trunk/ctaforge.php)
          if [ -z "$HEADER_VER" ]; then
            # Flexible match
            HEADER_VER=$(grep "Version:" trunk/ctaforge.php | grep -oP "[\d.]+")
          fi
          if [ "$HEADER_VER" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "❌ Plugin header Version ($HEADER_VER) ≠ git tag (${{ steps.version.outputs.VERSION }})"
            exit 1
          fi
          echo "✅ Plugin header version: $HEADER_VER"

      - name: PHP syntax check
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - run: |
          find trunk -name "*.php" | while IFS= read -r file; do
            php -l "$file" || exit 1
          done
          echo "✅ PHP syntax OK"

  # ─── Build ZIP ─────────────────────────────────────────────────────────────
  build-zip:
    name: Build Plugin ZIP
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      zip_name: ${{ steps.zip.outputs.ZIP_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Build ctaforge.zip
        id: zip
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          ZIP_NAME="ctaforge-${VERSION}.zip"

          # Create a clean staging directory — only plugin files, no repo infra
          mkdir -p /tmp/ctaforge-build/ctaforge

          # Copy trunk/ contents (the actual plugin)
          cp -r trunk/. /tmp/ctaforge-build/ctaforge/

          # Remove development-only files from the ZIP
          rm -rf /tmp/ctaforge-build/ctaforge/composer.json
          rm -rf /tmp/ctaforge-build/ctaforge/composer.lock
          rm -rf /tmp/ctaforge-build/ctaforge/vendor/
          rm -rf /tmp/ctaforge-build/ctaforge/node_modules/
          rm -rf /tmp/ctaforge-build/ctaforge/.phpcs.xml
          rm -rf /tmp/ctaforge-build/ctaforge/phpunit.xml
          find /tmp/ctaforge-build/ctaforge -name "*.test.*" -delete
          find /tmp/ctaforge-build/ctaforge -name ".DS_Store" -delete

          # Create the ZIP — extract creates a ctaforge/ folder (WordPress standard)
          cd /tmp/ctaforge-build
          zip -r "$ZIP_NAME" ctaforge/
          mv "$ZIP_NAME" $GITHUB_WORKSPACE/

          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "✅ Built $ZIP_NAME ($(du -sh $GITHUB_WORKSPACE/$ZIP_NAME | cut -f1))"
          echo ""
          echo "── Contents ──────────────────────────────────────────────────"
          unzip -l "$GITHUB_WORKSPACE/$ZIP_NAME"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: ${{ steps.zip.outputs.ZIP_NAME }}
          retention-days: 30

  # ─── GitHub Release ────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-zip]

    steps:
      - uses: actions/checkout@v4

      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-zip

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          # Extract the section for this version from readme.txt
          NOTES=$(awk "/^= ${VERSION} =/{found=1; next} found && /^= [0-9]/{exit} found{print}" trunk/readme.txt)
          if [ -z "$NOTES" ]; then
            NOTES="See readme.txt for full changelog."
          fi
          # Write to file (avoids shell escaping issues)
          echo "$NOTES" > /tmp/release_notes.txt
          echo "Release notes extracted for v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CTAForge v${{ needs.validate.outputs.version }}"
          body_path: /tmp/release_notes.txt
          files: ${{ needs.build-zip.outputs.zip_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── WordPress.org SVN Deploy ──────────────────────────────────────────────
